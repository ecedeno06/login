<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Cuenta - Premium App</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="registro.css">
    <link rel="icon" href="../image/guzman.ico" type="image/x-icon">
</head>

<body>

    <div class="container">
        <!-- Register Form -->
        <div id="register-card" class="card fade-in">
            <h1>Crear Cuenta</h1>
            <p class="subtitle">Únete a nuestra comunidad hoy</p>
            
            <form id="register-form">
                <div class="form-group">
                    <label for="register-name">Nombre Completo</label>
                    <input type="text" id="register-name" placeholder="Juan Pérez" required>
                </div>
                <div class="form-group">
                    <label for="register-email">Correo Electrónico</label>
                    <input type="email" id="register-email" placeholder="nombre@ejemplo.com" required>
                </div>
                <div class="form-group">
                    <label for="register-password">Contraseña</label>
                    <input type="password" id="register-password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary">Registrarse</button>
            </form>
            
            <p class="toggle-link">¿Ya tienes cuenta? <a href="index.html"><span>Inicia sesión</span></a></p>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
